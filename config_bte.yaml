# BTE 热导率验证计算配置
# 工作目录请放在 /data/bte_vasp，结构目录为 ./bte_structures

work_dir: .

manager:
  structures_dir: ./bte_structures
  scan_interval: 10
  task_timeout: 7200
  max_workers: 8
  qha: false
  bte: true
  plain_submit: false

worker:
  mode: vasp
  vasp_cmd: "mpirun --allow-run-as-root --oversubscribe -np $SLURM_NTASKS vasp_std"
  job_name: "bte_worker"

slurm:
  nodes: 1
  ntasks_per_node: 32
  partition: slinky
  time: "24:00:00"
  task_time: "24:00:00"
  mem: "64G"
  python_path: /data/software/miniforge3/envs/mattersim/bin/python
  module_init_script: null
  modules: []
  extra_commands:
    - export LD_LIBRARY_PATH=/home/share/apps/openmpi-5.0.7/lib:/home/share/apps/scalapack-2.2.2/lib:/home/share/apps/fftw-3.3.10/lib:/home/share/apps/openblas/lib:$LD_LIBRARY_PATH

opt:
  fmax: 0.01
  refine_structure: true

potcar:
  functional: PBE_54

status_files:
  running: ".running"
  success: ".success"
  failed: ".failed"

failure:
  log_file: ./failed_tasks.txt
  task_error_file: error.log

task_types:
  opt: "opt"
  bte_opt: "bte_opt"
  bte_fc2: "bte_fc2"
  bte_fc3: "bte_fc3"
  bte_postprocess: "bte_postprocess"

# 声子配置（BTE 模式下保留以满足代码读取）
phonon:
  supercell: null
  max_atoms: 100
  displacement_distance: 0.01
  t_min: 0
  t_max: 1000
  t_step: 10

qha:
  volumes: [0.98, 0.99, 1.0, 1.01, 1.02]
  pressure: 0
  t_min: 0
  t_max: 800
  t_step: 10

bte:
  pressures: [0, 10, 20, 30, 40, 50, 60, 70, 80]
  supercell: null
  max_atoms: null
  min_atoms: 100
  min_length: 10.0
  displacement_distance: 0.03
  symprec: 1.0e-03
  method: RTA
  is_isotope: true
  tmin: 50
  tmax: 500
  tstep: 50
  target_length: 60.0
  max_mesh: 24

vasp_sets:
  opt: mprelax
  qha_opt: mprelax
  bte_opt: mprelax
  phonon: matpes
  plain: matpes

incar:
  opt:
    ALGO: Normal
    EDIFF: 1.0e-07
    ENCUT: 680
    ENAUG: 1360
    IBRION: 2
    ISIF: 3
    ISMEAR: 0
    ISPIN: 1
    ISTART: 0
    KSPACING: 0.22
    LASPH: true
    LCHARG: false
    LMAXMIX: 6
    LMIXTAU: true
    LREAL: false
    LWAVE: false
    METAGGA: R2scan
    NELM: 200
    NELMIN: 6
    NSW: 100
    PREC: Accurate
    SIGMA: 0.05

  phonon:
    ALGO: Normal
    EDIFF: 1.0e-08
    ENCUT: 680
    ENAUG: 1360
    IBRION: -1
    ISMEAR: 0
    ISPIN: 1
    ISTART: 0
    KSPACING: 0.22
    LASPH: true
    LCHARG: false
    LMAXMIX: 6
    LMIXTAU: true
    LREAL: false
    LWAVE: false
    METAGGA: R2scan
    NELM: 200
    NELMIN: 6
    NSW: 0
    PREC: Accurate
    SIGMA: 0.05

  plain:
    ALGO: Normal
    EDIFF: 1.0e-08
    ENCUT: 680
    ENAUG: 1360
    IBRION: -1
    ISMEAR: 0
    ISPIN: 1
    ISTART: 0
    KSPACING: 0.22
    LASPH: true
    LCHARG: false
    LMAXMIX: 6
    LMIXTAU: true
    LREAL: false
    LWAVE: false
    METAGGA: R2scan
    NELM: 200
    NELMIN: 6
    NSW: 0
    PREC: Accurate
    SIGMA: 0.05
